# workflow_dispatch only. Like test.yml through timezone, without lint/tests.
# Same concurrency group as test.yml and sync workflows for diagnosis.

name: Actions runner smoke

on:
  workflow_dispatch:

concurrency: non-concurrent

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install apt dependencies
      uses: awalsh128/cache-apt-pkgs-action@v1.4.3
      with:
        packages: heimdal-dev   # Workaround for problem building gssapi wheel, see https://stackoverflow.com/questions/44449290/krb5-config-is-not-recognized-as-an-internal-or-external-command
        version: 1.0

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install pip dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install wheel
        if [ -f requirements_lock.txt ]; then pip install -r requirements_lock.txt; fi

    - name: Set timezone   # so that we observations are stored to CAMS in NZ time
      uses: zcong1993/setup-timezone@v2.0.0
      with:
        timezone: Pacific/Auckland

    - name: Bootstrap sanity check
      run: |
        echo "bootstrap ok run=${{ github.run_id }} attempt=${{ github.run_attempt }}"
        python --version
        date
